        {

          "position": 1,

    <!-- ── Structured Data: FAQPage (AEO) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Keep Going free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Keep Going is completely free to use. Sign up with your email or Google account at keepgoing.club."
          }
        },
        {
          "@type": "Question",
          "name": "What is Keep Going?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Keep Going is a free focus timer and productivity app that helps you complete deep work sessions, track streaks, plan projects, earn achievement badges, and stay focused with built-in ambient sounds."
          }
        },
        {
          "@type": "Question",
          "name": "How is Keep Going different from a Pomodoro timer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Keep Going goes beyond a simple Pomodoro timer. It adds streak tracking, project planning with a date calendar, achievement badges, ambient focus sounds (LOFI Rain and CEO Flow), and a visual brick-wall metaphor to make your daily progress feel tangible."
          }
        },
        {
          "@type": "Question",
          "name": "What are bricks in Keep Going?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Each brick represents one completed focus session. You set a daily brick goal, and every session you finish lays another brick in your wall. A full day's goal means your wall is complete."
          }
        },
        {
          "@type": "Question",
          "name": "Does Keep Going have ambient sounds?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Keep Going includes LOFI Rain, CEO Flow (a cinematic chord progression), and multiple neural entrainment modes to help you stay focused during deep work."
          }
        },
        {
          "@type": "Question",
          "name": "Can I track multiple projects in Keep Going?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Keep Going has a Projects tab with a 7-day date strip. You can create date-scoped projects and see which days have active work planned."
          }
        }
      ]
    }
